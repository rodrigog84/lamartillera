<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#6B21A8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Gavel head -->
  <rect x="28" y="10" width="20" height="10" rx="3" fill="white" transform="rotate(-30 38 15)"/>
  <!-- Gavel handle -->
  <rect x="18" y="28" width="6" height="22" rx="3" fill="white" transform="rotate(-30 21 39)"/>
  <!-- House roof -->
  <polygon points="12,44 32,30 52,44" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>
  <!-- House body outline -->
  <rect x="20" y="44" width="24" height="12" rx="1" fill="none" stroke="white" stroke-width="2.5"/>
</svg>
